<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Uncle Joe and the Simplified Fractions Rescue</title>
  <style>
    :root{
      --cyan:#53e6ff;
      --purple:#9b5cff;
      --green:#72ff68;
      --gold:#ffe66d;
      --red:#ff5d7a;
      --white:#f7fbff;
      --muted:#bfd0e6;
      --line:rgba(148,220,255,.32);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#020613;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--white);
      touch-action:none;
    }
    body{overscroll-behavior:none}
    #game{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      display:block;
      background:#020613;
    }
    .hud{position:fixed;inset:0;pointer-events:none;z-index:5}
    .topbar{
      position:absolute; left:10px; right:10px; top:8px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .badge{
      display:flex; align-items:center; gap:8px; padding:8px 12px;
      border:1px solid var(--line); background:rgba(3,10,25,.68); border-radius:18px;
      box-shadow:0 0 18px rgba(83,230,255,.08); font-weight:800; text-shadow:0 1px 2px #000; min-height:38px;
      backdrop-filter:blur(6px);
    }
    .badge .small{font-size:12px;color:var(--muted);font-weight:700}
    .progressOuter{width:min(250px,34vw); height:13px; border-radius:999px; background:rgba(200,225,255,.18); overflow:hidden; border:1px solid rgba(255,255,255,.16)}
    .progressInner{width:0%;height:100%; background:linear-gradient(90deg,#64ff73,#53e6ff); border-radius:999px; transition:width .35s ease}
    .promptBox{
      position:absolute; left:50%; bottom:88px; transform:translateX(-50%); width:min(600px,92vw);
      padding:12px 14px; text-align:center; background:rgba(5,12,30,.86); border:1px solid rgba(83,230,255,.42); border-radius:18px;
      box-shadow:0 0 26px rgba(83,230,255,.16); display:none; pointer-events:auto; backdrop-filter:blur(6px);
    }
    .promptBox strong{color:var(--gold)}
    .promptBox button{
      margin-left:10px; padding:9px 14px; border:0; border-radius:14px; background:linear-gradient(180deg,#88ff7a,#2fb91b);
      color:#062010; font-weight:900; cursor:pointer; box-shadow:0 4px 0 #187010;
    }
    .soundBtn{
      position:absolute;
      right:10px;
      top:56px;
      pointer-events:auto;
      border:1px solid rgba(83,230,255,.38);
      background:rgba(3,10,25,.74);
      color:#eafcff;
      border-radius:999px;
      padding:8px 12px;
      font-weight:950;
      cursor:pointer;
      box-shadow:0 0 16px rgba(83,230,255,.12);
      backdrop-filter:blur(6px);
    }
    .soundBtn.off{
      border-color:rgba(255,93,122,.45);
      color:#ffd4dd;
    }
    .screen{
      position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at 20% 15%, rgba(112,90,255,.35), transparent 28%), radial-gradient(circle at 80% 25%, rgba(83,230,255,.23), transparent 26%), linear-gradient(180deg,#040918,#071226 62%,#030715);
      padding:16px;
    }
    .card{
      width:min(920px,96vw); max-height:94svh; overflow:auto; border:1px solid rgba(83,230,255,.38);
      background:linear-gradient(180deg,rgba(9,20,50,.94),rgba(9,14,32,.96)); box-shadow:0 0 40px rgba(83,230,255,.18), inset 0 0 22px rgba(157,92,255,.08);
      border-radius:28px; padding:22px; text-align:center;
    }
    .card h1{margin:6px 0 8px; font-size:clamp(26px,5vw,54px); line-height:1; color:#eafcff; text-shadow:0 0 16px rgba(83,230,255,.45)}
    .card h2{margin:6px 0 12px; color:var(--cyan); font-size:clamp(18px,3.5vw,32px)}
    .card p{max-width:760px; margin:8px auto; color:#d8e5fb; line-height:1.35; font-size:clamp(14px,2.5vw,18px)}
    .missionGrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px auto; max-width:820px}
    .missionItem{padding:11px; border-radius:18px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); font-weight:800; min-height:70px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px}
    .missionItem span:first-child{font-size:24px}
    .bigBtn{
      border:0; padding:14px 24px; border-radius:20px; background:linear-gradient(180deg,#78ff65,#2fc222); color:#05240c;
      font-size:clamp(18px,3vw,26px); font-weight:950; cursor:pointer; box-shadow:0 6px 0 #18780d,0 0 28px rgba(114,255,104,.25); margin-top:10px;
    }
    .smallBtn{border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:white; padding:10px 14px; border-radius:15px; font-weight:900; cursor:pointer}

    .quizModal{
      position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center; padding:8px;
      background:rgba(0,0,0,.5); backdrop-filter:blur(5px);
    }
    .quizCard{
      width:min(940px,98vw); max-height:96svh; overflow:hidden; border:1px solid rgba(83,230,255,.45); border-radius:24px;
      background:linear-gradient(180deg,rgba(9,20,45,.98),rgba(4,10,25,.99)); box-shadow:0 0 36px rgba(83,230,255,.18); padding:12px;
      display:flex; flex-direction:column; gap:8px;
    }
    .quizHead{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap}
    .quizTitle{font-size:clamp(18px,3vw,30px); font-weight:950; color:#fff}
    .pill{padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); color:#dfe9ff; font-weight:800}

    .questionPanel{
      display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin:0 auto; width:min(100%,760px);
      padding:10px; border-radius:22px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10);
    }
    .fracBlock{display:flex; flex-direction:column; align-items:center; gap:8px}
    .label{border:1px solid rgba(83,230,255,.35); background:rgba(83,230,255,.12); border-radius:999px; padding:6px 12px; font-size:14px; font-weight:900; color:#e6fbff}
    .label.purple{border-color:rgba(181,114,255,.45); background:rgba(181,114,255,.14)}
    .frac{
      min-width:112px; padding:10px 16px; border:2px solid rgba(83,230,255,.45); border-radius:18px; background:rgba(3,14,38,.9);
      box-shadow:inset 0 0 18px rgba(83,230,255,.08); font-size:40px; font-weight:950; line-height:1;
      display:grid; grid-template-rows:1fr 4px 1fr; gap:7px; align-items:center; justify-items:center;
    }
    .frac.purple{border-color:rgba(181,114,255,.7)}
    .barLine{height:4px; width:72px; border-radius:99px; background:#fff}
    .unknown{color:#ffe66d; text-shadow:0 0 16px rgba(255,230,109,.38)}
    .eq{font-size:54px; font-weight:950; color:#eaffff; text-shadow:0 0 12px rgba(83,230,255,.25)}

    .answerRow{display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; margin:0}
    input[type=number]{
      width:min(250px,66vw); font-size:26px; font-weight:950; text-align:center; color:#fff; background:#071831;
      border:2px solid rgba(83,230,255,.45); border-radius:18px; padding:10px 12px; outline:none;
    }
    input[type=number]:focus{box-shadow:0 0 20px rgba(83,230,255,.25)}
    .simplifyAnswer{
      display:grid;
      grid-template-rows:1fr 4px 1fr;
      gap:5px;
      align-items:center;
      justify-items:center;
      padding:8px 12px;
      border:2px solid rgba(255,230,109,.45);
      border-radius:18px;
      background:rgba(255,230,109,.08);
      min-width:138px;
    }
    .simplifyAnswer input{
      width:92px;
      padding:6px 8px;
      font-size:22px;
      border-radius:14px;
    }
    .answerBar{
      width:84px;
      height:4px;
      border-radius:999px;
      background:#fff;
    }
    .wholeAnswer{
      display:none;
      align-items:center;
      gap:10px;
      padding:9px 13px;
      border:2px solid rgba(255,230,109,.45);
      border-radius:18px;
      background:rgba(255,230,109,.08);
      font-weight:950;
      color:#fff3a6;
    }
    .wholeAnswer input{
      width:100px;
      padding:8px 10px;
      font-size:24px;
      border-radius:14px;
    }
    #rightFrac.whole{
      grid-template-rows:1fr;
      min-height:126px;
      align-content:center;
    }
    #rightFrac.whole .barLine,
    #rightFrac.whole #rightDen{
      display:none;
    }
    #rightFrac.whole #rightNum{
      font-size:56px;
    }
    .checkBtn{border:0; border-radius:18px; padding:12px 20px; font-size:20px; font-weight:950; color:#06240a; background:linear-gradient(180deg,#8bff72,#2ebc1d); box-shadow:0 5px 0 #1b7a12; cursor:pointer}

    .resultMsg{min-height:24px; text-align:center; font-weight:950; font-size:18px; margin:0}
    .resultMsg.good{color:var(--green)}
    .resultMsg.bad{color:#ff8ea2}

    .explain{
      display:none; width:100%; border:1px solid rgba(83,230,255,.22); background:rgba(255,255,255,.045); border-radius:20px; padding:10px;
    }
    .explain.show{display:block}
    .explainHeader{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-bottom:6px}
    .modelTitle{color:#bdefff; font-weight:950; font-size:20px}
    .phaseTag{padding:5px 10px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); font-weight:900; color:#e9f6ff; font-size:13px}
    .replayBtn{
      border:1px solid rgba(255,230,109,.45);
      background:rgba(255,230,109,.13);
      color:#fff5a8;
      border-radius:999px;
      padding:6px 11px;
      font-weight:950;
      cursor:pointer;
      box-shadow:0 0 14px rgba(255,230,109,.12);
    }
    .replayBtn:active{filter:brightness(1.35)}
    .nextStepReplay{
      background:rgba(83,230,255,.14);
      border-color:rgba(83,230,255,.45);
      color:#c9f8ff;
    }
    .explainGrid{display:grid; grid-template-columns:1.05fr .95fr; gap:10px; align-items:center}
    .changeLine{display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; margin:2px 0}
    .miniFrac{display:grid; grid-template-rows:1fr 3px 1fr; align-items:center; justify-items:center; gap:3px; font-size:27px; font-weight:950; min-width:54px}
    .miniBar{width:46px; height:3px; background:#fff; border-radius:99px}
    .times{color:#ff5d7a; font-weight:950; font-size:22px; line-height:1.12}
    .arrow{color:#ffe66d; font-size:30px; font-weight:950}
    .stepText{color:#d9f4ff; font-size:17px; font-weight:900; text-align:center}
    .animatedWrap{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px}
    .animatedLabel{font-size:16px; font-weight:950; color:#d9f6ff}
    .animatedLabel .from{color:#9bdfff}
    .animatedLabel .to{color:#dca6ff}
    .barModel{
      display:grid; gap:0; width:min(100%,420px); border:3px solid rgba(255,255,255,.9); border-radius:14px; overflow:hidden; height:46px; background:rgba(255,255,255,.03
